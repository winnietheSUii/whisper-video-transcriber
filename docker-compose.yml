version: '3.8'

services:
  scribe-ai:
    build: .
    container_name: scribe-ai
    ports:
      - "5000:5000"

    volumes:
      - ./data:/app/data
      - whisper_cache:/root/.cache/whisper

    restart: unless-stopped

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000"]
      interval: 30s
      timeout: 10s
      retries: 3

    # Uncomment the below if you want to limit RAM usage on weaker machines
    # deploy:
    #   resources:
    #     limits:
    #       memory: 4g

volumes:
  whisper_cache:
