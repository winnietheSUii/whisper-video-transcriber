version: '3.8'

services:
  scribe-ai:
    build: .
    container_name: scribe-ai
    ports:
      - "5000:5000"
    volumes:
      # Map the data folder out to the host system so transcripts are accessible
      - ./data:/app/data
      
      # Use a Docker volume to cache the Whisper AI model downloading.
      # This prevents downloading the massive model every time we restart Docker!
      - whisper_cache:/root/.cache/whisper
      
    restart: unless-stopped

volumes:
  whisper_cache:
