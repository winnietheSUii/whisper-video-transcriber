<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scribe | AI Video Transcriber</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <style>
        .modern-select {
            width: 100%;
            padding: 1rem;
            border-radius: 0.75rem;
            border: 1px solid var(--border);
            background: rgba(0, 0, 0, 0.4);
            color: white;
            font-size: 1rem;
            appearance: none;
            cursor: pointer;
            outline: none;
        }
        .modern-select option {
            background: #1e293b;
            color: white;
        }
        .copy-group {
            display: flex;
            gap: 10px;
        }
        .icon-btn.txt {
            width: auto; padding: 0 1rem; font-size: 0.9rem; font-weight: bold; border-radius: 0.5rem; color: #38bdf8; border: 1px solid #38bdf8;
        }
        .icon-btn.srt {
            width: auto; padding: 0 1rem; font-size: 0.9rem; font-weight: bold; border-radius: 0.5rem; color: #a78bfa; border: 1px solid #a78bfa;
        }
    </style>
</head>
<body>
    <div class="background-elements">
        <div class="orb orb-1"></div>
        <div class="orb orb-2"></div>
    </div>
    
    <main class="container">
        <header>
            <h1>Scribe</h1>
            <p>Transform audio and video into text with AI</p>
        </header>

        <div class="glass-panel">
            
            <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 1rem; margin-bottom: 2rem;">
                <!-- Global Options: AI Model Selection -->
                <div class="input-group">
                    <label for="global-model">Select AI Model</label>
                    <select id="global-model" class="modern-select">
                        <option value="tiny">Tiny (Fastest, Smallest)</option>
                        <option value="base">Base (Good balance)</option>
                        <option value="small">Small (Better accuracy)</option>
                        <option value="medium" selected>Medium (High accuracy, Recommended)</option>
                        <option value="large-v2">Large-V2 (Pro: Excellence)</option>
                        <option value="large-v3">Large-V3 (God-tier)</option>
                    </select>
                </div>
                
                <div class="input-group">
                    <label for="global-language">Spoken Language</label>
                    <select id="global-language" class="modern-select">
                        <option value="" selected>Auto Detect</option>
                        <option value="th">Thai</option>
                        <option value="en">English</option>
                        <option value="ja">Japanese</option>
                        <option value="ko">Korean</option>
                        <option value="zh">Chinese</option>
                    </select>
                </div>

                <div class="input-group">
                    <label for="global-task">Output Task</label>
                    <select id="global-task" class="modern-select">
                        <option value="transcribe" selected>Transcribe (Original Text)</option>
                        <option value="translate">Translate to English</option>
                    </select>
                </div>
            </div>

            <div class="tabs">
                <button class="tab-btn active" data-tab="upload">Upload File</button>
                <button class="tab-btn" data-tab="youtube">YouTube URL</button>
            </div>

            <div class="tab-content active" id="tab-upload">
                <div class="upload-area" id="drop-zone">
                    <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                        <polyline points="17 8 12 3 7 8"></polyline>
                        <line x1="12" y1="3" x2="12" y2="15"></line>
                    </svg>
                    <p>Drag & drop your video/audio file here</p>
                    <span class="or">or</span>
                    <input type="file" id="file-input" accept="audio/*,video/*" hidden>
                    <button class="btn primary-btn" onclick="document.getElementById('file-input').click()">Browse Files</button>
                    <div id="file-name" class="file-name"></div>
                </div>
                <button id="transcribe-upload-btn" class="btn magic-btn" disabled>Add to Queue</button>
            </div>

            <div class="tab-content" id="tab-youtube">
                <div class="input-group">
                    <label for="yt-url">YouTube Video URL</label>
                    <input type="url" id="yt-url" placeholder="https://www.youtube.com/watch?v=...">
                </div>
                <button id="transcribe-yt-btn" class="btn magic-btn">Add to Queue</button>
            </div>
            
            <div id="loading" class="loading-state hidden">
                <div class="spinner" style="margin-bottom: 1rem;"></div>
                <p id="status-text" style="font-weight: 500; color: #f8fafc; margin-bottom: 1rem;">Queued...</p>
                <button id="cancel-btn" class="btn" style="background: rgba(239, 68, 68, 0.1); border: 1px solid #ef4444; color: #f87171; padding: 0.5rem 1rem; width: auto; display: inline-block;">Cancel Action</button>
            </div>
        </div>

        <div id="result-panel" class="glass-panel result-panel hidden">
            <div class="result-header">
                <h2>Result</h2>
                <div class="copy-group">
                    <button id="copy-txt-btn" class="icon-btn txt" title="Copy raw text">Copy TXT</button>
                    <button id="copy-srt-btn" class="icon-btn srt" title="Copy subtitle format">Copy SRT</button>
                </div>
            </div>
            <div class="result-text" id="result-text"></div>
        </div>
    </main>

    <script>
        const tabBtns = document.querySelectorAll('.tab-btn');
        const tabContents = document.querySelectorAll('.tab-content');

        tabBtns.forEach(btn => {
            btn.addEventListener('click', () => {
                tabBtns.forEach(b => b.classList.remove('active'));
                tabContents.forEach(c => c.classList.remove('active'));
                btn.classList.add('active');
                document.getElementById(`tab-${btn.dataset.tab}`).classList.add('active');
            });
        });

        // File handling
        const fileInput = document.getElementById('file-input');
        const fileNameDisplay = document.getElementById('file-name');
        const transcribeUploadBtn = document.getElementById('transcribe-upload-btn');
        let selectedFile = null;

        function updateFile(file) {
            selectedFile = file;
            fileNameDisplay.textContent = file.name;
            transcribeUploadBtn.disabled = false;
        }

        fileInput.addEventListener('change', e => { if (e.target.files.length) updateFile(e.target.files[0]); });
        
        const dropZone = document.getElementById('drop-zone');
        dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('drag-active'); });
        dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag-active'));
        dropZone.addEventListener('drop', e => { 
            e.preventDefault(); 
            dropZone.classList.remove('drag-active'); 
            if (e.dataTransfer.files.length) updateFile(e.dataTransfer.files[0]); 
        });

        // Polling Queue Logic
        let pollInterval = null;
        let finalTxt = "";
        let finalSrt = "";
        let currentJobId = null;
        let startTime = 0;

        window.addEventListener('load', () => {
            const savedJobId = localStorage.getItem('currentJobId');
            if (savedJobId) {
                startPolling(savedJobId, true);
            }
        });

        function showLoading() {
            document.getElementById('loading').classList.remove('hidden');
            document.getElementById('result-panel').classList.add('hidden');
            document.querySelectorAll('.magic-btn').forEach(b => b.disabled = true);
        }

        function hideLoading() {
            document.getElementById('loading').classList.add('hidden');
            document.querySelectorAll('.magic-btn').forEach(b => b.disabled = false);
        }

        function startPolling(jobId, isResume = false) {
            currentJobId = jobId;
            localStorage.setItem('currentJobId', jobId);
            
            if (!isResume) startTime = Date.now();
            else startTime = localStorage.getItem('currentJobStartTime') || Date.now();
            
            localStorage.setItem('currentJobStartTime', startTime);

            document.getElementById('status-text').textContent = "Queued in background...";
            showLoading();
            
            pollInterval = setInterval(async () => {
                try {
                    const res = await fetch(`/status/${jobId}`);
                    if (res.status === 404) {
                        clearInterval(pollInterval);
                        hideLoading();
                        localStorage.removeItem('currentJobId');
                        return;
                    }
                    
                    const data = await res.json();
                    
                    if (data.status === 'completed') {
                        clearInterval(pollInterval);
                        hideLoading();
                        localStorage.removeItem('currentJobId');
                        finalTxt = data.text;
                        finalSrt = data.srt;
                        document.getElementById('result-text').textContent = finalTxt;
                        document.getElementById('result-panel').classList.remove('hidden');
                        document.getElementById('result-panel').scrollIntoView({ behavior: 'smooth' });
                    } else if (data.status === 'failed' || data.status === 'cancelled') {
                        clearInterval(pollInterval);
                        hideLoading();
                        localStorage.removeItem('currentJobId');
                        if (data.status === 'failed') alert('Transcribe Failed: ' + data.error);
                    } else {
                        // processing or queued
                        let elapsed = Math.floor((Date.now() - startTime) / 1000);
                        let m = Math.floor(elapsed / 60);
                        let s = elapsed % 60;
                        let timeStr = `[${m}m ${s}s]`;
                        document.getElementById('status-text').textContent = (data.message || "Working...") + " " + timeStr;
                    }
                } catch (e) {
                    console.error("Polling error", e);
                }
            }, 2000); // Check every 2 seconds
        }

        document.getElementById('cancel-btn').addEventListener('click', async () => {
            if (!currentJobId) return;
            try {
                await fetch(`/cancel/${currentJobId}`, { method: 'POST' });
                clearInterval(pollInterval);
                hideLoading();
                localStorage.removeItem('currentJobId');
                alert("Job cancelled! If the model was already transcribing, the background thread might still be churning for a short while, but the UI is freed up.");
            } catch (e) {
                alert("Could not cancel: " + e);
            }
        });

        // Action Hooks
        transcribeUploadBtn.addEventListener('click', async () => {
            if (!selectedFile) return;
            showLoading();
            
            const formData = new FormData();
            formData.append('file', selectedFile);
            formData.append('model', document.getElementById('global-model').value);
            formData.append('language', document.getElementById('global-language').value);
            formData.append('task', document.getElementById('global-task').value);

            try {
                const res = await fetch('/transcribe/upload', { method: 'POST', body: formData });
                const data = await res.json();
                if (res.ok) startPolling(data.job_id);
                else { alert('Error: ' + data.error); hideLoading(); }
            } catch (err) { alert('Request failed'); hideLoading(); }
        });

        document.getElementById('transcribe-yt-btn').addEventListener('click', async () => {
            const url = document.getElementById('yt-url').value;
            if (!url) return alert('Please enter a YouTube URL');
            showLoading();

            try {
                const res = await fetch('/transcribe/youtube', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        url: url,
                        model: document.getElementById('global-model').value,
                        language: document.getElementById('global-language').value,
                        task: document.getElementById('global-task').value
                    })
                });
                const data = await res.json();
                if (res.ok) startPolling(data.job_id);
                else { alert('Error: ' + data.error); hideLoading(); }
            } catch (err) { alert('Request failed'); hideLoading(); }
        });

        // Copy functionality
        const copyBtnFallback = (text, btnId, originalName) => {
            navigator.clipboard.writeText(text);
            const btn = document.getElementById(btnId);
            btn.textContent = "Copied!";
            setTimeout(() => btn.textContent = originalName, 2000);
        }

        document.getElementById('copy-txt-btn').addEventListener('click', () => copyBtnFallback(finalTxt, 'copy-txt-btn', 'Copy TXT'));
        document.getElementById('copy-srt-btn').addEventListener('click', () => copyBtnFallback(finalSrt, 'copy-srt-btn', 'Copy SRT'));

    </script>
</body>
</html>
